<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>GrantService</title>
        <base href="/">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
    </head>
    <body>
        <div class="login-wrapper">
        <div class="login-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Enter your details to access your account.</p>

            <form (ngSubmit)="onLogin()" #loginForm="ngForm">
            
            <div class="input-group">
                <label>Email address</label>
                <div class="input-wrapper">
                <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="john@example.com" required>
                <span class="material-symbols-outlined">mail</span>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="enter your password" required>
                </div>
            </div>

            <button type="submit" class="continue-btn" [disabled]="!loginForm.valid">
                Continue <span class="material-symbols-outlined">arrow_forward</span>
            </button>

            </form>

            <p class="terms">By continuing, you agree to our <span>Terms of Service</span>.</p>
        </div>
        </div>
    </body>
</html>
