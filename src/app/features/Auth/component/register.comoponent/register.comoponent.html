<div class="login-wrapper">
  <div class="login-card shadow-sm">
    <h1>Create Account</h1>
    <p class="subtitle">Join the GrantServe community</p>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="form-grid">
        
        <div class="input-group-custom full-width">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="bi bi-person"></i>
            <input type="text" formControlName="name" placeholder="Enter your full name">
          </div>
        </div>

        <div class="input-group-custom">
          <label>Role</label>
          <div class="input-wrapper">
            <i class="bi bi-shield-lock"></i>
            <select formControlName="role" class="minimal-select">
              <option value="" disabled>Select Role</option>
                <option value="RESEARCHER">Researcher</option>
                <option value="REVIEWER">Reviewer</option>
                <option value="MANAGER">Manager</option>
                <option value="ADMIN">Admin</option>
                <option value="COMPLIANCE">Compliance</option>
                <option value="AUDITOR">Auditor</option>
            </select>
          </div>
        </div>

        <div class="input-group-custom">
          <label>Phone Number</label>
          <div class="input-wrapper">
            <i class="bi bi-phone"></i>
            <input type="tel" formControlName="phone" placeholder="Enter your phone number">
          </div>
        </div>

        <div class="input-group-custom full-width">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope"></i>
            <input type="email" formControlName="email" placeholder="Enter your email address">
          </div>
        </div>

        <div class="input-group-custom full-width">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock"></i>
            <input type="password" formControlName="password" placeholder="Enter your password">
          </div>
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="continue-btn">
        Create Account <i class="bi bi-arrow-right"></i>
      </button>

      <p class="terms">Already have an account? <span routerLink="/">Login</span></p>
    </form>
  </div>
</div>
