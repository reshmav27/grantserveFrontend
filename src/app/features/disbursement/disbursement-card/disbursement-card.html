<div class="card h-100 border-0 shadow-sm" style="border-radius: 14px; overflow: hidden;">
  <div class="card-header d-flex justify-content-between align-items-center bg-white pt-3 pb-2 border-bottom-0">
    <span class="text-muted fw-bold small">{{ formattedId }}</span>
    <span class="badge rounded-pill px-3 py-2" [ngClass]="statusClass">
      {{ resolvedStatus }}
    </span>
  </div>

  <div class="card-body pt-1 pb-2">
    <h5 class="fw-bold text-dark mb-1" style="font-size: 1rem; line-height: 1.4;">{{ data.title }}</h5>
    <p class="text-muted small mb-0">
      <i class="bi bi-collection me-1"></i>Program ID: {{ data.programID }}
    </p>
  </div>

  <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center py-3" style="border-color: #f1f5f9 !important;">
    <div class="small text-secondary d-flex align-items-center gap-1">
      <i class="bi bi-calendar-check"></i>
      <span>{{ dateDisplay }}</span>
    </div>
    <button class="btn btn-sm btn-outline-primary rounded-pill px-3" style="font-size: 0.78rem;" (click)="viewDetails.emit(data)">
      View Details
    </button>
  </div>
</div>
