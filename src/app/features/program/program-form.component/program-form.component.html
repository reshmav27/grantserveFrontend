<app-manager-header [showSubHeader]="false"></app-manager-header>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-0 p-4 p-md-5">
        <h2 class="fw-bold mb-1">{{ isEditMode ? 'Edit Program' : 'Create New Program' }}</h2>
        <p class="text-muted mb-4">Define the core details for the program.</p>

        <form [formGroup]="programForm">
          <div class="mb-4">
            <label class="form-label fw-semibold">Program Title</label>
            <input type="text" formControlName="title" class="form-control form-control-lg" 
                   placeholder="Enter title..." 
                   [class.is-invalid]="programForm.get('title')?.touched && programForm.get('title')?.invalid">
            <div class="invalid-feedback">A program title is required.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Description</label>
            <textarea formControlName="description" class="form-control" rows="4" 
                      placeholder="Describe the program's purpose..."></textarea>
          </div>

          <div class="row mb-5">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Start Date</label>
              <input type="date" formControlName="startDate" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">End Date</label>
              <input type="date" formControlName="endDate" class="form-control">
            </div>
            <div *ngIf="programForm.hasError('invalidDate')" class="text-danger small mt-2">
              Error: Start Date must be before End Date.
            </div>
          </div>

          <div class="d-flex flex-column flex-md-row justify-content-between gap-3 border-top pt-4">
            <button type="button" class="btn btn-outline-secondary px-4" (click)="cancel()" [disabled]="isSubmitting">
              Cancel
            </button>

            <div class="d-flex gap-3">
              <button type="button" class="btn btn-light border px-4" (click)="handleSave('DRAFT')" [disabled]="isSubmitting">
                Save Draft
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
              </button>

              <button type="button" class="btn btn-primary px-4" (click)="handleSave('ACTIVE')" [disabled]="isSubmitting">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
                Save and Add Budget →
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
