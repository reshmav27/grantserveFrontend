<div class="card shadow-sm h-100">
  <div class="card-header d-flex justify-content-between align-items-center bg-white border-bottom-0 pt-3">
    <span class="text-muted fw-bold small">{{ formattedId }}</span>
    
    @if (data.status) {
      <span class="badge rounded-pill px-3 py-2" 
            [ngClass]="'status-' + data.status.toLowerCase().replace(' ', '-')">
        {{ data.status }}
      </span>
    }
  </div>

  <div class="card-body">
    <h5 class="card-title fw-bold text-dark mb-1">{{ data.title }}</h5>
    <p class="text-muted small mb-0">Program ID: {{ data.programId }}</p>
  </div>

  <div class="card-footer bg-white border-top-0 pb-3 d-flex justify-content-between align-items-center">
    <div class="small text-secondary">
      <i class="bi bi-calendar3 me-1"></i>
      {{ data.submittedDate | date:'mediumDate' }}
    </div>
    <button class="btn btn-link btn-sm text-decoration-none p-0" (click)="onViewDetails()">View Details</button>
  </div>
</div>
