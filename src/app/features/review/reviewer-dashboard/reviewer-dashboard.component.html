
<nav class="navbar navbar-dark bg-dark px-4 py-2 mb-4">
  <a class="navbar-brand d-flex align-items-center" href="#">
    <strong>GrantServe</strong> <span class="ms-2 badge bg-secondary text-uppercase" style="font-size: 0.6em;">Reviewer</span>
  </a>
  <button class="btn btn-outline-danger btn-sm" (click)="logout()">
    Logout
  </button>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Reviewer Dashboard</h3>
    <span class="badge bg-primary">Logged in as ID: {{ reviewerId }}</span>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">Review ID</th>
            <th>Proposal ID</th>
            <th>Status</th>
            <th>Score</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reviews">
            <td class="ps-4">{{ r.reviewid }}</td>
            <td>{{ r.proposalid }}</td>
            <td>
              <span [class]="r.status === 'REVIEWED' ? 'badge bg-success' : 'badge bg-warning text-dark'">
                {{ r.status }}
              </span>
            </td>
            <td>{{ r.score || 'N/A' }}</td>
            <td class="text-center">
              <button class="btn btn-primary btn-sm px-3" [disabled]="r.status === 'REVIEWED'">
                Evaluate
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Empty State -->
      <div *ngIf="reviews.length === 0" class="text-center py-5">
        <i class="bi bi-inbox fs-1 text-muted"></i>
        <p class="text-muted mt-2">No assignments found for this reviewer.</p>
      </div>
    </div>
  </div>
</div>
