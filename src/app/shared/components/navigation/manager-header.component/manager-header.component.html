@if (showSubHeader && isDashboard) {
  <header class="bg-white border-bottom py-3">
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <h4 class="fw-bold mb-0">Programs Dashboard</h4>
        
        <div>
          <div class="d-flex align-items-center gap-2 w-100 w-md-auto">
            <div class="input-group" style="flex: 1; min-width: 200px; max-width: 400px;">
              <input type="text" class="form-control" placeholder="Search programs..." />
              <button class="btn btn-outline-secondary">
                <i class="bi bi-filter"></i>
              </button>
            </div>
            
            <a routerLink="/programs/create" class="btn btn-primary d-flex align-items-center gap-1 text-nowrap">
              <i class="bi bi-plus-lg"></i>
              <span class="d-none d-sm-inline">New Program</span>
              <span class="d-inline d-sm-none">New</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>
}

@if (showSubHeader && !isDashboard) {
  <header class="bg-white border-bottom mb-4 py-2">
    <div class="container">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
          <a [routerLink]="['/programs']" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> <span class="d-none d-sm-inline">Back</span>
          </a>
          <span class="fw-bold text-dark fs-5 text-truncate">{{ title }}</span>
        </div>
        
        <div class="d-flex align-items-center gap-2 w-md-auto">
          <input type="text" class="form-control" placeholder="Search..." style="max-width: 300px; flex: 1" />
          
          <a routerLink="/programs/create" class="btn btn-primary btn-sm d-flex align-items-center gap-1 text-nowrap">
            <i class="bi bi-plus-lg"></i>
            <span>New Program</span>
          </a>
        </div>
      </div>
    </div>
  </header>
}
