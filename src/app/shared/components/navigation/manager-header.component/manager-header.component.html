<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-2">
  <div class="container">
    <a class="navbar-brand d-flex flex-column lh-1 m-0" routerLink="/programs">
      <span class="fw-bold text-primary fs-4">GrantServe</span>
      <span class="text-uppercase text-muted fw-bold mt-1" style="font-size: 0.65rem; letter-spacing: 0.5px;">
        Manager Console
      </span>
    </a>

    <div class="collapse navbar-collapse d-none d-lg-flex">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item" *ngFor="let item of navItems">
          <a class="nav-link custom-nav-link" [routerLink]="item.route" routerLinkActive="active">
            {{ item.label }}
          </a>
        </li>
      </ul>
      <div class="navbar-nav">
        <a class="nav-link logout-link text-danger-emphasis d-flex align-items-center gap-2" (click)="logout()"
          style="cursor: pointer;">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </div>

    <button class="navbar-toggler border-0 shadow-none d-lg-none" type="button" (click)="toggleOffcanvas()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas-end position-fixed h-100 border-start" [class.show]="isOffcanvasOpen">
      <div class="offcanvas-header border-bottom p-3 d-flex justify-content-between align-items-center">
        <h5 class="m-0 fw-bold text-primary">Menu</h5>
        <button type="button" class="btn-close shadow-none" (click)="closeOffcanvas()"></button>
      </div>
      <div class="offcanvas-body p-3 d-flex flex-column">
        <ul class="navbar-nav gap-2">
          <li class="nav-item" *ngFor="let item of navItems">
            <a class="nav-link p-3" [routerLink]="item.route" (click)="closeOffcanvas()">
              <i *ngIf="item.icon" class="bi {{ item.icon }} me-2"></i>
              {{ item.label }}
            </a>
          </li>
        </ul>
        <div class="mt-auto border-top pt-3">
          <button class="btn btn-link text-danger text-decoration-none w-100 text-start p-3" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i> Logout
          </button>
        </div>
      </div>
    </div>

    <div class="custom-backdrop" [class.show]="isOffcanvasOpen" (click)="closeOffcanvas()"></div>
  </div>
</nav>

@if (showSubHeader && isDashboard) {
<header class="bg-white border-bottom py-3">
  <div class="container">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
      <div class="d-flex gap-4 border-bottom border-light-subtle">
        @for (s of availableStatuses; track s.value) {
        <button (click)="selectStatus(s.value)" class="nav-tab-btn" [class.active]="selectedStatus === s.value">
          {{ s.label }}
          <span class="active-indicator"></span>
        </button>
        }
      </div>

      <div class="d-flex align-items-center gap-2">
        <div class="input-group" style="min-width: 250px;">
          <input type="text" class="form-control" placeholder="Search programs..." [(ngModel)]="searchTerm"
            (input)="applyFilters()" />
          <button class="btn btn-outline-secondary" (click)="toggleAdvancedFilters()"
            [class.active]="showAdvancedFilters">
            <i class="bi bi-filter"></i>
          </button>
        </div>

        <a routerLink="/programs/create" class="btn btn-primary d-flex align-items-center gap-1 text-nowrap">
          <i class="bi bi-plus-lg"></i>
          <span class="d-none d-sm-inline">New Program</span>
          <span class="d-inline d-sm-none">New</span>
        </a>
      </div>
    </div>

    @if (showAdvancedFilters) {
    <div class="row g-2 mt-3 p-3 bg-light rounded border mx-0 shadow-sm">
      <div class="col-6 col-md-3">
        <label class="small fw-bold text-muted">Start Date</label>
        <input type="date" class="form-control form-control-sm" [(ngModel)]="startDate" (change)="applyFilters()">
      </div>
      <div class="col-6 col-md-3">
        <label class="small fw-bold text-muted">End Date</label>
        <input type="date" class="form-control form-control-sm" [(ngModel)]="endDate" (change)="applyFilters()">
      </div>
      <div class="col-6 col-md-3">
        <label class="small fw-bold text-muted">Sort By</label>
        <select class="form-select form-select-sm" [(ngModel)]="sortBy" (change)="applyFilters()">
          <option value="programID">ID</option>
          <option value="title">Title</option>
          <option value="startDate">Start Date</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="small fw-bold text-muted">Direction</label>
        <select class="form-select form-select-sm" [(ngModel)]="direction" (change)="applyFilters()">
          <option value="desc">Descending</option>
          <option value="asc">Ascending</option>
        </select>
      </div>
    </div>
    }
  </div>
</header>
}
